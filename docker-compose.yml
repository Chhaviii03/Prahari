services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: prahari
      POSTGRES_PASSWORD: prahari_dev
      POSTGRES_DB: prahari
    ports:
      - "5433:5432"
    volumes:
      - prahari_pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prahari -d prahari"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prahari_pgdata:
